# queries_factuais.yaml
#
# Gabaritos para consultas FACTUAIS (1 valor numerico esperado).
#
# Schema por item:
#   id: F-NNN                        identificador unico
#   query: str                       pergunta natural ao sistema
#   expected_value: float            valor esperado contra a fonte primaria
#   tolerance_pct: float             tolerancia relativa (% do esperado)
#   unit: str | null                 unidade de medida (PISA pts, %, anos, etc.)
#   primary_source: str              fonte oficial onde o valor pode ser checado
#   doi: str | null                  DOI da fonte, se aplicavel
#   notes: str | null                contexto adicional
#   _verified: bool                  TODO Fase 2: cross-checar antes do run oficial
#
# IMPORTANTE: ate `_verified: true` em todos os itens, este arquivo eh DRAFT.
# Ver `golden/README.md` para o protocolo de verificacao.

