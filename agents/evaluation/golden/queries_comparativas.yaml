# queries_comparativas.yaml
#
# Gabaritos para consultas COMPARATIVAS (Brasil vs. media OCDE ou Brasil
# vs. um pais desenvolvido). Cada item carrega dois (ou mais) valores
# esperados + lista das fontes que a resposta DEVE citar para receber
# credito de cobertura.
#
# Schema por item:
#   id: C-NNN
#   query: str
#   countries: list[str]                  paises envolvidos (ISO3)
#   expected_brazil: float                valor para o Brasil
#   expected_oecd_avg: float | null       media OCDE (se aplicavel)
#   expected_other: {iso3: float} | null  outros valores quando relevantes
#   year: int
#   tolerance_pct: float
#   unit: str
#   sources_required: list[str]           fontes que devem aparecer na resposta
#   primary_source: str
#   notes: str | null
#   _verified: bool                       TODO Fase 2

- id: C-001
  query: "Compare o gasto publico em educacao como % do PIB entre Brasil e media OCDE em 2021."
  countries: ["BRA"]
  expected_brazil: 5.5
  expected_oecd_avg: 4.9
  expected_other: null
  year: 2021
  tolerance_pct: 10
  unit: "% do PIB"
  sources_required: ["INEP", "OECD"]
  primary_source: "OECD Education at a Glance 2024 + SIOPE/INEP"
  notes: "Brasil acima da media OCDE em % do PIB embora abaixo em USD por aluno"
  _verified: false

