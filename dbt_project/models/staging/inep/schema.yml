version: 2

models:
  - name: stg_inep_ideb
    description: >
      IDEB municipal (INEP) em formato longo: 1 linha por (etapa, municipio,
      rede, ano). Combina 6 parquets bronze (3 etapas x 2 ciclos: 2019 e 2021)
      via UNPIVOT das colunas VL_OBSERVADO_<ano> e VL_PROJECAO_<ano>. A
      planilha 2019 traz toda a serie historica observada ate aquele ciclo
      + metas projetadas ate 2021; a planilha 2021 traz apenas o observado
      do proprio ciclo.
    columns:
      - name: etapa_codigo
        description: "Codigo curto da etapa: 'AI', 'AF', 'EM'."
        tests:
          - not_null
          - accepted_values:
              values: ['AI', 'AF', 'EM']
      - name: etapa
        description: "Rotulo canonico: 'anos_iniciais_fund', 'anos_finais_fund', 'ensino_medio'."
        tests:
          - not_null
          - accepted_values:
              values: ['anos_iniciais_fund', 'anos_finais_fund', 'ensino_medio']
      - name: uf
        description: "Sigla da UF (RO, AC, ...). Vem direto do SG_UF do INEP."
        tests:
          - not_null
      - name: municipio_id
        description: "Codigo IBGE de 7 digitos do municipio."
        tests:
          - not_null
      - name: municipio_nome
        description: "Nome do municipio (cru, conforme INEP)."
      - name: rede
        description: >
          Rede de ensino. 'Publica' e o agregado das tres redes
          publicas (Federal + Estadual + Municipal), pre-calculado pelo INEP.
        tests:
          - not_null
          - accepted_values:
              values: ['Estadual', 'Federal', 'Municipal', 'Pública']
      - name: ano
        description: "Ano da observacao do IDEB."
        tests:
          - not_null
          - accepted_range:
              arguments:
                min_value: 2005
                max_value: 2030
      - name: nota_observada
        description: "IDEB calculado pelo INEP (= N x P, nota padronizada x indicador de rendimento)."
        tests:
          - accepted_range:
              arguments:
                min_value: 0
                max_value: 10
      - name: nota_meta
        description: "Meta projetada pelo INEP para o municipio/rede/ano. NULL quando nao ha projecao."
        tests:
          - accepted_range:
              arguments:
                min_value: 0
                max_value: 10
      - name: ciclo_divulgacao
        description: "Ciclo de divulgacao da planilha de origem (2019 ou 2021)."
        tests:
          - not_null
          - accepted_values:
              values: [2019, 2021]
