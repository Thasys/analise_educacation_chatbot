version: 2

models:
  - name: mart_gasto_x_alfabetizacao__correlacao
    description: >
      Cruzamento entre gasto publico em educacao (% PIB) e taxa de
      alfabetizacao 15+ (%) por pais e ano. INNER JOIN dos dois
      intermediates -- so paises com ambos indicadores no mesmo ano.
      Inclui efficiency_ratio e zscore_diff_alfab_minus_gasto para
      detectar outliers de eficiencia.

      ATENCAO: efficiency_ratio e indicador grosso, nao causal.
      Alfabetizacao tem teto natural ~100, entao paises ja saturados
      podem parecer ineficientes mesmo gastando bem. Use com z-scores.
    config:
      tags: ['gold', 'cross']
    columns:
      - name: country_iso3
        description: ISO-3 do pais.
        tests:
          - not_null
      - name: country_name
        description: Nome do pais em PT-BR.
        tests:
          - not_null
      - name: grouping
        description: Grupo analitico da seed.
        tests:
          - not_null
      - name: year
        description: Ano da observacao.
        tests:
          - not_null
      - name: gasto_value
        description: "Gasto educacao % PIB (fonte: World Bank, identica a UIS por construcao)."
        tests:
          - not_null
      - name: alfab_value
        description: "Literacy rate 15+ %% (fonte: coalesce UNESCO -> WB -> CEPAL)."
        tests:
          - not_null
      - name: efficiency_ratio
        description: >
          alfab_value / gasto_value. Heuristica de eficiencia. Valores
          tipicos 14-30 (ex.: BR ~16, paises com ~99% alfab e ~5% gasto
          tem ratio ~20).
      - name: zscore_gasto_year
        description: Z-score de gasto_value contra todos os paises com dado no ano.
      - name: zscore_alfab_year
        description: Z-score de alfab_value contra todos os paises com dado no ano.
      - name: zscore_diff_alfab_minus_gasto
        description: >
          zscore_alfab - zscore_gasto. Positivo = alfabetizacao
          relativamente mais alta que gasto (eficiencia comparativa).
          Negativo = gasto relativamente alto pra alfabetizacao baixa.
      - name: percentile_gasto_year
        description: Percentil de gasto no ano (0=min, 1=max).
      - name: percentile_alfab_year
        description: Percentil de alfabetizacao no ano (0=min, 1=max).
