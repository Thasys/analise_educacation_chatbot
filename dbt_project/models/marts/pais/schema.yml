version: 2

models:
  - name: mart_br__evolucao_indicadores
    description: >
      Evolucao temporal do Brasil em todos os indicadores Silver,
      formato long (uma linha por indicador-fonte-ano). Inclui posicao
      relativa de BR em OCDE e LATAM, alem de estatistas globais
      (mean, median, total de paises com dado). Util para "perfil-pais
      Brasil" longitudinal.
    config:
      tags: ['gold', 'br']
    columns:
      - name: indicator_id
        description: ID canonico do indicador.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["GASTO_EDU_PIB", "LITERACY_15M"]
      - name: indicator_name
        description: Nome legivel do indicador (PT-BR).
        tests:
          - not_null
      - name: source
        description: Fonte original (worldbank, unesco, oecd, ipea, cepalstat).
        tests:
          - not_null
      - name: year
        description: Ano da observacao.
        tests:
          - not_null
      - name: value_br
        description: Valor BR do indicador na fonte e ano.
        tests:
          - not_null
      - name: unit
        description: Unidade canonica.
      - name: global_mean
        description: Media global (todos os paises da Silver) no mesmo ano-indicador-fonte.
      - name: global_median
        description: Mediana global no mesmo ano-indicador-fonte.
      - name: countries_global
        description: Numero de paises com dado no mesmo ano-indicador-fonte.
      - name: gap_to_global_mean
        description: "value_br - global_mean (em pp / unidade do indicador)."
      - name: rank_in_ocde
        description: Posicao do BR no ranking OCDE (1 = melhor) entre paises com dado.
      - name: countries_in_ocde
        description: Total de paises OCDE+BR com dado.
      - name: rank_in_latam
        description: Posicao do BR no ranking LATAM (1 = melhor).
      - name: countries_in_latam
        description: Total de paises LATAM com dado.
