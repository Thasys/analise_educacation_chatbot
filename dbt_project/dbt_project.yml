# dbt project — transformações SQL do data lakehouse (Fases 2 e 3).
# Documentação: https://docs.getdbt.com/reference/dbt_project.yml

name: "analise_education"
version: "0.1.0"
config-version: 2

profile: "analise_education"

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
analysis-paths: ["analyses"]

clean-targets:
  - "target"
  - "dbt_packages"

vars:
  # Raiz da Camada Bronze relativa ao dbt_project/. Sobreponível via env DBT_BRONZE_ROOT.
  bronze_root: "{{ env_var('DBT_BRONZE_ROOT', '../data/bronze') }}"

seeds:
  analise_education:
    +schema: seeds
    iso_3166_paises:
      +column_types:
        iso2: VARCHAR
        iso3: VARCHAR
        name_pt: VARCHAR
        name_en: VARCHAR
        un_m49: INTEGER
        grouping: VARCHAR
    ibge_ufs:
      +column_types:
        uf_code: VARCHAR
        sigla: VARCHAR
        nome: VARCHAR
        regiao_codigo: VARCHAR
        regiao_nome: VARCHAR
    isced_2011:
      +column_types:
        isced_level: VARCHAR
        descricao_pt: VARCHAR
        descricao_en: VARCHAR

models:
  analise_education:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: table
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts
      +tags: ["gold"]
