# dbt project — transformações SQL do data lakehouse (Fases 2 e 3).
# Documentação: https://docs.getdbt.com/reference/dbt_project.yml

name: "analise_education"
version: "0.1.0"
config-version: 2

profile: "analise_education"

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
analysis-paths: ["analyses"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  analise_education:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: table
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts
